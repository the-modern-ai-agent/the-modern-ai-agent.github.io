<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 230" role="img" aria-label="AlexNet classifying ImageNet images into labeled categories">
  <rect width="600" height="230" rx="14" fill="#0a0f17"/>
  <text x="28" y="40" font-family="ui-monospace, monospace" font-size="13" fill="#7ee0ff" letter-spacing="2">IMAGENET · 2012</text>
  <!-- input image grid -->
  <g transform="translate(28,60)">
    <rect width="150" height="130" rx="8" fill="#0f1726" stroke="#263247"/>
    <g>
      <rect x="14" y="14" width="56" height="48" rx="4" fill="#16314a"/>
      <rect x="80" y="14" width="56" height="48" rx="4" fill="#1c2b1c"/>
      <rect x="14" y="68" width="56" height="48" rx="4" fill="#2a1c33"/>
      <rect x="80" y="68" width="56" height="48" rx="4" fill="#33291c"/>
    </g>
  </g>
  <!-- conv stack -->
  <g transform="translate(210,70)">
    <rect x="0" y="0" width="22" height="100" rx="3" fill="#13233a" stroke="#7ee0ff"/>
    <rect x="34" y="12" width="18" height="76" rx="3" fill="#13233a" stroke="#7ee0ff"/>
    <rect x="64" y="24" width="14" height="52" rx="3" fill="#13233a" stroke="#7ee0ff"/>
    <rect x="90" y="32" width="10" height="36" rx="3" fill="#241b40" stroke="#b39dff"/>
    <text x="0" y="120" font-family="ui-monospace, monospace" font-size="10" fill="#7f93ac">deep CNN · GPU-trained</text>
  </g>
  <!-- arrows -->
  <g stroke="#9fb0c6" fill="#9fb0c6">
    <line x1="186" y1="125" x2="206" y2="120"/><polygon points="206,116 206,124 212,120"/>
    <line x1="320" y1="120" x2="356" y2="120"/><polygon points="356,116 356,124 362,120"/>
  </g>
  <!-- labels output -->
  <g transform="translate(366,72)" font-family="-apple-system, system-ui, sans-serif" font-size="12">
    <rect width="206" height="96" rx="8" fill="#0f1726" stroke="#263247"/>
    <g>
      <circle cx="20" cy="22" r="4" fill="#7dffb0"/><text x="34" y="26" fill="#e6edf6">Leopard — 0.92</text>
      <circle cx="20" cy="48" r="4" fill="#5fb88a"/><text x="34" y="52" fill="#9fb0c6">Jaguar — 0.05</text>
      <circle cx="20" cy="74" r="4" fill="#3a6b53"/><text x="34" y="78" fill="#7f93ac">Cheetah — 0.02</text>
    </g>
  </g>
  <text x="366" y="190" font-family="ui-monospace, monospace" font-size="10" fill="#7f93ac">top-5 predicted labels</text>
</svg>
